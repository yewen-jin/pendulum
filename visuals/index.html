<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>pendulum</title>
    <style>
      html, body { margin: 0; background: #000; overflow: hidden; height: 100%; }
      canvas#stage { display: block; width: 100vw; height: 100vh; }
      #debug {
        position: fixed; top: 8px; left: 8px;
        font: 11px/1.45 ui-monospace, Menlo, monospace;
        color: #8f8; background: rgba(0,0,0,.55); padding: 6px 8px;
        max-width: 52ch; pointer-events: none; white-space: pre;
        border: 1px solid #0f06; display: none;
      }
      body.debug #debug { display: block; }
      /* Section headers need clicks; rest stays non-interactive */
      #debug .dbg-header { pointer-events: auto; }

      #settings {
        position: fixed; top: 8px; right: 8px;
        font: 12px/1.6 ui-monospace, Menlo, monospace;
        color: #8f8; background: rgba(0,0,0,.8); padding: 14px 16px;
        border: 1px solid #0f06; border-radius: 4px;
        z-index: 1000; display: none; min-width: 260px;
      }
      body.settings #settings { display: block; }
      #settings h3 { margin: 0 0 10px; font-size: 13px; color: #0f0; }
      #settings label { display: block; margin-bottom: 8px; font-size: 11px; color: #8f8a; }
      #settings select, #settings input[type="range"] {
        display: block; width: 100%; margin-top: 3px;
      }
      #settings select {
        font: 12px ui-monospace, Menlo, monospace;
        color: #0f0; background: #111; border: 1px solid #0f03;
        padding: 3px 4px;
      }
      #settings input[type="range"] {
        accent-color: #0f0; height: 4px;
      }
      #settings .t-val { float: right; color: #0f0; font-size: 11px; }
      #settings .t-row { margin-top: 12px; }
      #settings button {
        padding: 4px 12px; font: 11px ui-monospace, Menlo, monospace;
        color: #f88; background: #400a; border: 1px solid #f003; cursor: pointer;
      }
      #settings button:hover { background: #f002; }
      #settings .t-hint { margin-top: 10px; font-size: 10px; color: #8f8a; }
      #settings kbd {
        padding: 1px 4px; border: 1px solid #0f04; border-radius: 2px;
        font-size: 10px; color: #0f0;
      }
      /* Collapsible posture section */
      #settings .t-collapse { margin-top: 12px; border-top: 1px solid #0f03; padding-top: 8px; }
      #settings .t-collapse-header {
        cursor: pointer; color: #0f0; font-size: 12px; font-weight: bold;
        user-select: none; padding: 2px 0;
      }
      #settings .t-collapse-header:hover { color: #5f5; }
      #settings .t-collapse-body { display: none; padding-top: 6px; }
      #settings .t-group-label {
        font-size: 10px; color: #8f8a; margin-top: 8px; margin-bottom: 3px;
        text-transform: uppercase; letter-spacing: 0.05em;
      }
      #settings .t-group-label:first-child { margin-top: 0; }
      #settings label.t-toggle {
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 4px; font-size: 11px; color: #8f8; cursor: pointer;
      }
      #settings label.t-toggle input[type="checkbox"] {
        width: auto; accent-color: #0f0; cursor: pointer;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="debug"></div>
    <div id="settings"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
